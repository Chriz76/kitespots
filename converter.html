<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitespot SEO HTML Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-center items-center p-6">

    <div class="max-w-3xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-black text-sky-400 mb-2">🪁 Kitespot HTML-Seiten Generator</h1>
        <p class="text-sm text-slate-400 mb-6">
            Füge deine 100 CSV-Zeilen unten ein. Der Browser generiert daraus statische, SEO-optimierte HTML-Seiten inklusive passgenauer iFrame-Verlinkung und packt sie in eine ZIP-Datei.
        </p>

        <div class="mb-4">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Deine Wetter-App URL:</label>
            <input type="text" id="appUrl" value="https://deine-wetter-app.de/" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-sky-300 focus:outline-none focus:border-sky-500">
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">CSV-Inhalt (inklusive Header-Zeile):</label>
            <textarea id="csvInput" rows="12" placeholder="id;slug;name;lat;lon;metaTitle;metaDescription;headline;description;windInfo;safetyInfo&#10;1;fehmarn-altenteil;Fehmarn - Altenteil;54.5122;11.1044;..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs font-mono text-emerald-400 focus:outline-none focus:border-emerald-500 whitespace-pre"></textarea>
        </div>

        <button id="generateBtn" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-sky-900/30 flex items-center justify-center gap-2">
            🚀 HTML-Seiten generieren & als ZIP herunterladen
        </button>

        <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // Das exakt gleiche HTML-Template, das wir für die Seiten nutzen
        function generateHtmlTemplate(spot, appUrl) {
            const iframeUrl = `${appUrl}?lat=${spot.lat}&lon=${spot.lon}`;
            
            return `<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${spot.metaTitle}</title>
    <meta name="description" content="${spot.metaDesc}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="${appUrl}spots/${spot.slug}.html">
    <meta property="og:title" content="${spot.metaTitle}">
    <meta property="og:description" content="${spot.metaDesc}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="${appUrl}spots/${spot.slug}.html">
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        .iframe-container { position: relative; width: 100%; height: 650px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-radius: 0.75rem; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="font-bold text-xl text-sky-600">🪁 ICON-D2 KiteWeather</a>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-8">
        <nav class="text-xs text-slate-400 mb-4">Home &gt; Kitespots &gt; <span class="text-slate-600 font-medium">${spot.name}</span></nav>
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-4">${spot.headline}</h1>
            <div class="flex flex-wrap gap-4 text-xs text-slate-500 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                <div><strong>📍 Koordinaten:</strong> Lat: ${spot.lat} | Lon: ${spot.lon}</div>
                <div><strong>📊 Wettermodell:</strong> DWD ICON-D2 (2.2km Grid)</div>
            </div>
        </header>
        <section id="map" class="mb-12">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="text-lg font-bold text-slate-900 mb-3">Interaktiver ICON-D2 Windreport & HD-Karten-Overlay</h2>
                <div class="iframe-container bg-slate-100">
                    <iframe src="${iframeUrl}" width="100%" height="100%" style="border:none;" allow="geolocation" loading="lazy"></iframe>
                </div>
            </div>
        </section>
        <section id="details" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2">
                <article class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h2 class="text-xl font-bold text-slate-900 mb-4 border-b pb-2">Revierbeschreibung & Bedingungen</h2>
                    <p class="text-slate-600 leading-relaxed">${spot.description}</p>
                </article>
            </div>
            <div class="space-y-6">
                <div class="bg-sky-50 border border-sky-200 p-6 rounded-xl shadow-sm">
                    <h3 class="text-base font-bold text-sky-900 mb-3">💨 Beste Windrichtungen</h3>
                    <p class="text-sm text-sky-800 leading-relaxed">${spot.windInfo}</p>
                </div>
                <div class="bg-amber-50 border border-amber-200 p-6 rounded-xl shadow-sm">
                    <h3 class="text-base font-bold text-amber-900 mb-3">⚠️ Gefahren & Regeln</h3>
                    <p class="text-sm text-amber-800 leading-relaxed">${spot.safetyInfo}</p>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-slate-900 text-slate-400 text-xs py-8 mt-16 text-center">&copy; 2026 ICON-D2 KiteWeather.</footer>
</body>
</html>`;
        }

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const csvText = document.getElementById('csvInput').value.trim();
            let appUrl = document.getElementById('appUrl').value.trim();
            const statusDiv = document.getElementById('status');

            if (!csvText) {
                alert('Bitte füge zuerst deine CSV-Daten ein!');
                return;
            }

            // Sicherstellen, dass die App-URL mit einem / endet
            if (!appUrl.endsWith('/')) appUrl += '/';

            statusDiv.classList.remove('hidden', 'text-emerald-400', 'text-red-400');
            statusDiv.classList.add('text-sky-400');
            statusDiv.innerText = 'Verarbeite Daten und erstelle ZIP...';

            try {
                const zip = new JSZip();
                const lines = csvText.split('\n');
                let count = 0;

                // Ab Zeile 1 starten, um die Header-Zeile (Zeile 0) zu überspringen
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const columns = line.split(';');
                    if (columns.length < 11) continue;

                    const spot = {
                        id: columns[0].trim(),
                        slug: columns[1].trim(),
                        name: columns[2].trim(),
                        lat: columns[3].trim(),
                        lon: columns[4].trim(),
                        metaTitle: columns[5].trim(),
                        metaDesc: columns[6].trim(),
                        headline: columns[7].trim(),
                        description: columns[8].trim(),
                        windInfo: columns[9].trim(),
                        safetyInfo: columns[10].trim()
                    };

                    const htmlContent = generateHtmlTemplate(spot, appUrl);
                    // Datei im ZIP-Ordner platzieren
                    zip.file(`${spot.slug}.html`, htmlContent);
                    count++;
                }

                if (count === 0) {
                    throw new Error('Keine gültigen Zeilen zum Verarbeiten gefunden. Format geprüft (getrennt durch Semikolon)?');
                }

                // Generiere das fertige ZIP im Browser-Speicher
                const content = await zip.generateAsync({ type: 'blob' });
                
                // Automatischer Download Trigger
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = 'kitespots_seo_pages.zip';
                link.click();

                statusDiv.classList.replace('text-sky-400', 'text-emerald-400');
                statusDiv.innerText = `🎉 Erfolgreich! ${count} HTML-Seiten generiert und als 'kitespots_seo_pages.zip' heruntergeladen.`;

            } catch (err) {
                statusDiv.classList.replace('text-sky-400', 'text-red-400');
                statusDiv.innerText = '❌ Fehler: ' + err.message;
            }
        });
    </script>
</body>
</html>
