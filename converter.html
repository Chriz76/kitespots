<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitespot SEO Master Generator v7.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-center items-center p-6">

    <div class="max-w-3xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-black text-sky-400 mb-2">🪁 Kitespot SEO Master Generator (v7.1)</h1>
        <p class="text-sm text-slate-400 mb-6">
            Füge deine CSV-Zeilen ein. Dieses Tool generiert das komplette Paket inklusive einer automatischen `privacy.html`, die auf jeder Unterseite im Footer verlinkt ist.
        </p>

        <div class="mb-4">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Deine Wetter-App URL:</label>
            <input type="text" id="appUrl" value="https://deine-wetter-app.de/" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-sky-300 focus:outline-none focus:border-sky-500">
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">CSV-Inhalt (inklusive Header-Zeile):</label>
            <textarea id="csvInput" rows="10" placeholder="id;slug;name;lat;lon;metaTitle;metaDescription;headline;description;windInfo;safetyInfo" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs font-mono text-emerald-400 focus:outline-none focus:border-emerald-500 whitespace-pre"></textarea>
        </div>

        <button id="generateBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg flex items-center justify-center gap-2">
            📦 Komplettes SEO-Paket generieren (.zip)
        </button>

        <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // TEMPLATE 1: Einzelne Spot-Seite mit Back-Links & Privacy im Footer
        function generateSpotTemplate(spot, appUrl) {
            const iframeUrl = `${appUrl}?lat=${spot.lat}&lon=${spot.lon}`;
            return `<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${spot.metaTitle}</title>
    <meta name="description" content="${spot.metaDesc}">
    <link rel="canonical" href="${appUrl}spots/${spot.slug}.html">
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        .iframe-wrapper { position: relative; width: 100%; height: 550px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-radius: 0.75rem; overflow: hidden; }
        .iframe-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; cursor: pointer; background: rgba(0, 0, 0, 0); transition: background 0.2s; }
        .iframe-wrapper:hover .iframe-overlay { background: rgba(14, 165, 233, 0.04); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="${appUrl}" class="font-bold text-xl text-sky-600">🪁 ICON-D2 KiteWeather</a>
            <a href="./index.html" class="text-sm font-medium text-slate-600 hover:text-sky-600 transition">&larr; Alle Kitespots</a>
        </div>
    </header>
    
    <main class="max-w-6xl mx-auto px-4 py-8">
        <nav class="text-xs text-slate-400 mb-4">
            <a href="${appUrl}" class="hover:underline">Home</a> &gt; 
            <a href="./index.html" class="hover:underline text-sky-600 font-medium">Kitespots</a> &gt; 
            <span class="text-slate-600">${spot.name}</span>
        </nav>
        
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-4">${spot.headline}</h1>
            <div class="flex flex-wrap gap-4 text-xs text-slate-500 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                <div><strong>📍 Koordinaten:</strong> Lat: ${spot.lat} | Lon: ${spot.lon}</div>
                <div><strong>📊 Modell:</strong> DWD ICON-D2 RUC (2.1km Grid)</div>
                <div><strong>🔄 Update:</strong> Stündlich (Rapid Update Cycle)</div>
            </div>
        </header>

        <section id="map" class="mb-12">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-3">
                    <h2 class="text-lg font-bold text-slate-900">Interaktiver ICON-D2 Windreport</h2>
                    <span class="text-xs font-semibold bg-sky-100 text-sky-700 px-2 py-1 rounded-md animate-pulse">
                        🖱️ Klicken für Vollbildmodus
                    </span>
                </div>
                <div class="iframe-wrapper bg-slate-100">
                    <a href="${iframeUrl}" target="_blank" rel="noopener" class="iframe-overlay"></a>
                    <iframe src="${iframeUrl}" width="100%" height="100%" style="border:none;" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <section id="details" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="md:col-span-2">
                <article class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-full">
                    <h2 class="text-xl font-bold text-slate-900 mb-4 border-b pb-2">Revierbeschreibung & Bedingungen</h2>
                    <p class="text-slate-600 leading-relaxed">${spot.description}</p>
                </article>
            </div>
            <div class="space-y-6">
                <div class="bg-sky-50 border border-sky-200 p-6 rounded-xl shadow-sm">
                    <h3 class="text-base font-bold text-sky-900 mb-3">💨 Beste Windrichtungen</h3>
                    <p class="text-sm text-sky-800 leading-relaxed">${spot.windInfo}</p>
                </div>
                <div class="bg-amber-50 border border-amber-200 p-6 rounded-xl shadow-sm">
                    <h3 class="text-base font-bold text-amber-900 mb-3">⚠️ Gefahren & Regeln</h3>
                    <p class="text-sm text-amber-800 leading-relaxed">${spot.safetyInfo}</p>
                </div>
            </div>
        </section>

        <section id="technical-specs" class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-6 mb-12">
            <h2 class="text-xl font-bold text-slate-900 border-b pb-2">Zusatzinformationen & Modell-Details</h2>
            <p class="text-sm text-slate-600 leading-relaxed">
                Dies ist der hochpräzise Datenreport für Grundwind, Böen und Windrichtung an dem Kitespot <strong>${spot.name}</strong>. Während gängige Wetter-Apps meist globale Modelle mit grober Auflösung rendern, visualisiert diese Anwendung das absolute Premium-Lokalmodell des Deutschen Wetterdienstes: das <strong>ICON-D2 RUC (Rapid Update Cycle)</strong> mit einem ultra-feinen <strong>2.1-km-Grid</strong>. Die Daten werden stündlich frisch berechnet, um lokale Thermik- und Düseneffekte perfekt einzufangen.
            </p>
        </section>

        <div class="text-center">
            <a href="./index.html" class="inline-flex items-center gap-2 bg-white border border-slate-300 text-slate-700 hover:text-sky-600 hover:border-sky-400 px-6 py-3 rounded-xl text-sm font-medium shadow-sm transition">
                &larr; Zurück zur Übersicht aller Kitespots
            </a>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 text-xs py-6 text-center mt-16">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>&copy; 2026 ICON-D2 KiteWeather.</div>
            <div class="flex gap-4">
                <a href="./index.html" class="hover:underline hover:text-slate-200">Kitespots</a>
                <a href="./privacy.html" class="hover:underline hover:text-slate-200">Privacy & Contact</a>
            </div>
        </div>
    </footer>
</body>
</html>`;
        }

        // TEMPLATE 2: index.html Übersichtsseite (Mit Privacy im Footer)
        function generateIndexTemplate(spots, appUrl) {
            const spotsJson = JSON.stringify(spots.map(s => ({ name: s.name, headline: s.headline, slug: s.slug })));
            return `<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitespots Übersicht - Hochauflösender ICON-D2 Windreport</title>
    <meta name="description" content="Entdecke über 100 Kitespots mit stündlich aktualisierten ICON-D2 RUC Wind- und Böen-Vorhersagen vom DWD. Finde jetzt den besten Wind.">
    <link class="canonical" href="${appUrl}spots/index.html">
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="${appUrl}" class="font-bold text-xl text-sky-600">🪁 ICON-D2 KiteWeather</a>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="text-center max-w-2xl mx-auto mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-4">Wähle deinen Kitespot</h1>
            <p class="text-slate-600 text-base">Präzise 2.1-km-Modellvorhersagen für Grundwind und Böen. Stündlich aktualisiert durch den Rapid Update Cycle des DWD.</p>
            <div class="mt-6 relative">
                <input type="text" id="searchBar" placeholder="🔍 Spot suchen (z.B. Fehmarn, Walchensee...)" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 pl-11 text-slate-900 focus:outline-none focus:border-sky-500 shadow-sm transition">
            </div>
        </div>
        <div id="spotGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        <div id="noResults" class="text-center text-slate-400 mt-12 hidden">Keine Spots unter diesem Namen gefunden.</div>
    </main>
    
    <footer class="bg-slate-900 text-slate-400 text-xs py-8 text-center mt-12">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>&copy; 2026 ICON-D2 KiteWeather.</div>
            <div class="flex gap-4">
                <a href="./index.html" class="hover:underline hover:text-slate-200">Kitespots</a>
                <a href="./privacy.html" class="hover:underline hover:text-slate-200">Privacy & Contact</a>
            </div>
        </div>
    </footer>

    <script>
        const spots = ${spotsJson};
        const searchBar = document.getElementById('searchBar');
        const spotGrid = document.getElementById('spotGrid');
        const noResults = document.getElementById('noResults');
        function renderSpots(filteredSpots) {
            spotGrid.innerHTML = '';
            if(filteredSpots.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');
            filteredSpots.forEach(spot => {
                spotGrid.innerHTML += \`
                    <a href="./\${spot.slug}.html" class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-sky-300 transition flex flex-col justify-between group">
                        <div>
                            <h2 class="font-bold text-lg text-slate-900 group-hover:text-sky-600 transition mb-2">\${spot.name}</h2>
                            <p class="text-xs text-slate-500 leading-relaxed">\${spot.headline}</p>
                        </div>
                        <div class="mt-4 text-xs font-semibold text-sky-600 flex items-center gap-1">Windreport ansehen &rarr;</div>
                    </a>
                \`;
            });
        }
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = spots.filter(s => s.name.toLowerCase().includes(query));
            renderSpots(filtered);
        });
        renderSpots(spots);
    <\/script>
</body>
</html>`;
        }

        // NEW TEMPLATE 4: privacy.html (Eigenständige Infoseite in ansprechendem Tailwind-Design)
        function generatePrivacyTemplate(appUrl) {
            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy & Project Info - ICON-D2 KiteWeather</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="${appUrl}" class="font-bold text-xl text-sky-600">🪁 ICON-D2 KiteWeather</a>
            <a href="./index.html" class="text-sm font-medium text-slate-600 hover:text-sky-600 transition">&larr; Kitespots</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12 flex-grow w-full">
        <article class="bg-white p-8 md:p-10 rounded-2xl border border-slate-200 shadow-sm prose max-w-none">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-6">About this Project & Contact</h1>
            <p class="text-slate-600 leading-relaxed mb-4">
                This project is a private, free, and ad-free open-source wind web app and kitespot nformation page. It is maintained strictly for hobby use and pursues no commercial interests. The forecasts and spot descriptions might be wrong. Always check the real conditions.
            </p>
            <p class="text-slate-600 leading-relaxed mb-6">
                The source code is fully transparent and publicly available on GitHub. If you have any questions, feedback, or suggestions, feel free to open an issue on GitHub or contact me directly via email.
            </p>
            
            <ul class="space-y-2 text-sm text-slate-600 mb-10 bg-slate-50 p-4 rounded-xl border border-slate-100">
                <li><strong>Developer & Code:</strong> https://github.com/Chriz76</li>
            </ul>

            <hr class="border-slate-200 my-8">

            <h2 class="text-2xl font-bold text-slate-900 mb-4">Privacy Policy</h2>
            <p class="text-slate-600 leading-relaxed mb-4">
                Because your privacy matters, this web app does not collect, store, or track any of your personal data. We do not use any marketing or tracking cookies, and there is no user registration required.
            </p>
            <p class="text-slate-600 leading-relaxed mb-6">
                However, to provide this web app in a stable, secure, and fast manner, we rely on modern cloud infrastructure. Due to technical requirements, a minimal amount of data processing occurs automatically in the background:
            </p>

            <h3 class="text-lg font-bold text-slate-900 mt-6 mb-2">1. Hosting via GitHub Pages</h3>
            <p class="text-slate-600 text-sm leading-relaxed mb-4">
                This web app is hosted as a static site on GitHub Pages (Service Provider: GitHub Inc., 88 Colin P Kelly Jr St, San Francisco, CA 94107, USA; Parent Company: Microsoft Corporation). When you access this app, GitHub automatically collects standard server log files (including your IP address, browser type, and the date and time of access). This is technically necessary to deliver the page securely and to prevent cyber attacks. GitHub/Microsoft is certified under the EU-US Data Privacy Framework, ensuring a GDPR-compliant level of data protection.
            </p>

            <h3 class="text-lg font-bold text-slate-900 mt-6 mb-2">2. Security & Content Delivery Network via Cloudflare</h3>
            <p class="text-slate-600 text-sm leading-relaxed mb-6">
                Additionally, we use the Content Delivery Network (CDN) provided by Cloudflare (Service Provider: Cloudflare Inc., 101 Townsend St, San Francisco, CA 94107, USA). Cloudflare acts as a security shield between our host server and your browser. During this process, your IP address is briefly processed to block malicious traffic (e.g., DDoS attacks) and to optimize page loading speeds globally. Cloudflare may set technically necessary cookies for security purposes, which do not create user profiles. Cloudflare is also certified under the EU-US Data Privacy Framework.
            </p>

            <p class="text-xs text-slate-400 bg-slate-50 p-3 rounded-lg">
                <strong>Legal Basis:</strong> The use of these third-party services is based on our legitimate interest (Art. 6 Abs. 1 lit. f GDPR) to offer this hobby project in a secure, high-performing, and reliable manner on the internet.
            </p>
        </article>
    </main>

    <footer class="bg-slate-900 text-slate-400 text-xs py-6 text-center">
        &copy; 2026 ICON-D2 KiteWeather. All rights reserved.
    </footer>
</body>
</html>`;
        }

        // TEMPLATE 3: sitemap.xml (Inklusive privacy.html für besseres SEO-Crawling)
        function generateSitemapTemplate(spots, appUrl) {
            let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;
            xml += `  <url>\n    <loc>${appUrl}</loc>\n    <changefreq>hourly</changefreq>\n    <priority>1.0</priority>\n  </url>\n`;
            xml += `  <url>\n    <loc>${appUrl}spots/index.html</loc>\n    <changefreq>daily</changefreq>\n    <priority>0.9</priority>\n  </url>\n`;
            xml += `  <url>\n    <loc>${appUrl}spots/privacy.html</loc>\n    <changefreq>monthly</changefreq>\n    <priority>0.3</priority>\n  </url>\n`;
            spots.forEach(spot => {
                xml += `  <url>\n    <loc>${appUrl}spots/${spot.slug}.html</loc>\n    <changefreq>hourly</changefreq>\n    <priority>0.8</priority>\n  </url>\n`;
            });
            xml += `</urlset>`;
            return xml;
        }

        // EXECUTION LOGIC
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const csvText = document.getElementById('csvInput').value.trim();
            let appUrl = document.getElementById('appUrl').value.trim();
            const statusDiv = document.getElementById('status');

            if (!csvText) {
                alert('Bitte füge zuerst deine CSV-Daten ein!');
                return;
            }

            if (!appUrl.endsWith('/')) appUrl += '/';

            statusDiv.classList.remove('hidden', 'text-emerald-400', 'text-red-400');
            statusDiv.classList.add('text-sky-400');
            statusDiv.innerText = 'Generiere SEO-Paket inklusive internen Verlinkungen und Privacy-Page...';

            try {
                const zip = new JSZip();
                const lines = csvText.split('\n');
                const spotsArray = [];

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const columns = line.split(';');
                    if (columns.length < 11) continue;

                    spotsArray.push({
                        id: columns[0].trim(),
                        slug: columns[1].trim(),
                        name: columns[2].trim(),
                        lat: columns[3].trim(),
                        lon: columns[4].trim(),
                        metaTitle: columns[5].trim(),
                        metaDesc: columns[6].trim(),
                        headline: columns[7].trim(),
                        description: columns[8].trim(),
                        windInfo: columns[9].trim(),
                        safetyInfo: columns[10].trim()
                    });
                }

                if (spotsArray.length === 0) {
                    throw new Error('Keine gültigen CSV-Zeilen gefunden.');
                }

                // 1. Generiere Spot-Seiten
                spotsArray.forEach(spot => {
                    const htmlContent = generateSpotTemplate(spot, appUrl);
                    zip.file(`${spot.slug}.html`, htmlContent);
                });

                // 2. Generiere index.html
                const indexContent = generateIndexTemplate(spotsArray, appUrl);
                zip.file('index.html', indexContent);

                // 3. NEW: Generiere privacy.html und lege sie mit in die ZIP
                const privacyContent = generatePrivacyTemplate(appUrl);
                zip.file('privacy.html', privacyContent);

                // 4. Generiere sitemap.xml
                const sitemapContent = generateSitemapTemplate(spotsArray, appUrl);
                zip.file('sitemap.xml', sitemapContent);

                const content = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = 'kitespots_complete_seo_package_v7.1.zip';
                link.click();

                statusDiv.classList.replace('text-sky-400', 'text-emerald-400');
                statusDiv.innerText = `🎉 Paket fertig geschnürt! ${spotsArray.length} Spots verlinken nun perfekt untereinander und jede Seite besitzt den Link zu 'privacy.html'.`;

            } catch (err) {
                statusDiv.classList.replace('text-sky-400', 'text-red-400');
                statusDiv.innerText = '❌ Fehler: ' + err.message;
            }
        });
    </script>
</body>
</html>
